name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: tv_volume_widget

      - name: Build Windows release
        run: flutter build windows --release
        working-directory: tv_volume_widget

      - name: Create portable zip
        run: |
          Compress-Archive -Path tv_volume_widget\build\windows\x64\runner\Release\* -DestinationPath TV-Volume-Widget-windows-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TV-Volume-Widget-windows-x64
          path: TV-Volume-Widget-windows-x64.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: TV-Volume-Widget-windows-x64.zip
          generate_release_notes: true
